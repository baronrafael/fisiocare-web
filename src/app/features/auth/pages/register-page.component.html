<main class="auth-shell">
  <section class="fc-card auth-card">
    <header class="auth-header">
      <img src="logo.png" alt="FISIOCARE" class="auth-logo" />
      <p class="auth-subtitle">Crea tu cuenta y empieza a organizar tu seguimiento clínico.</p>
    </header>

    <form class="mt-6 space-y-4" (ngSubmit)="onSubmit()">
      <fc-input-field
        label="Nombre(s)"
        type="text"
        name="firstName"
        [value]="firstName()"
        [required]="true"
        (valueChange)="firstName.set($event)"
      />

      <fc-input-field
        label="Apellido(s)"
        type="text"
        name="lastName"
        [value]="lastName()"
        [required]="true"
        (valueChange)="lastName.set($event)"
      />

      <fc-input-field
        label="Correo"
        type="email"
        name="email"
        [value]="email()"
        [required]="true"
        (valueChange)="email.set($event)"
      />

      <fc-input-field
        label="Contraseña"
        type="password"
        name="password"
        [value]="password()"
        [required]="true"
        (valueChange)="password.set($event)"
      />

      <fc-input-field
        label="Confirmar contraseña"
        type="password"
        name="confirmPassword"
        [value]="confirmPassword()"
        [required]="true"
        (valueChange)="confirmPassword.set($event)"
      />

      @if (passwordsMismatch()) {
        <p class="text-sm text-red-700">Las contraseñas no coinciden.</p>
      }

      <fc-button type="submit" [block]="true">Crear y entrar</fc-button>
    </form>

    <div class="mt-4">
      <fc-link-button variant="ghost" size="sm" [block]="true" [routerLink]="'/auth/login'">Iniciar sesión</fc-link-button>
    </div>
  </section>
</main>
