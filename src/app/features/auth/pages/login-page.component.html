<main class="auth-shell">
  <section class="fc-card auth-card">
    <header class="auth-header">
      <img src="logo.png" alt="FISIOCARE" class="auth-logo" />
      <p class="auth-subtitle">Gestiona pacientes, sesiones y seguimiento en un solo lugar.</p>
    </header>

    <form class="mt-6 space-y-4" novalidate (ngSubmit)="onSubmit()">
      <fc-input-field
        label="Correo"
        type="email"
        name="email"
        [value]="email()"
        [required]="true"
        (valueChange)="email.set($event)"
      />

      <fc-input-field
        label="Contraseña"
        type="password"
        name="password"
        [value]="password()"
        [required]="true"
        (valueChange)="password.set($event)"
      />

      <fc-button type="submit" [block]="true" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Ingresando...' : 'Iniciar sesión' }}
      </fc-button>

      @if (authError()) {
        <p class="text-sm text-red-700">{{ authError() }}</p>
      }
    </form>

    <div class="auth-secondary-actions mt-4">
      <fc-link-button variant="ghost" size="xs" [block]="true" [routerLink]="'/auth/forgot-password'">Recuperar contraseña</fc-link-button>
      <fc-link-button variant="ghost" size="xs" [block]="true" [routerLink]="'/auth/register'">Crear cuenta</fc-link-button>
    </div>
  </section>
</main>
