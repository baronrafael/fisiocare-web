<main class="auth-shell">
  <section class="fc-card auth-card">
    <p class="auth-brand">FisioCare</p>
    <h1 class="auth-title">Iniciar sesion</h1>
    <p class="auth-subtitle">Accede a tu practica clinica desde cualquier lugar.</p>

    <form class="mt-6 space-y-4" (ngSubmit)="onSubmit()">
      <fc-input-field
        label="Correo"
        type="email"
        name="email"
        [value]="email()"
        [required]="true"
        (valueChange)="email.set($event)"
      />

      <fc-input-field
        label="Contrasena"
        type="password"
        name="password"
        [value]="password()"
        [required]="true"
        (valueChange)="password.set($event)"
      />

      <fc-button type="submit" [block]="true">Entrar</fc-button>
    </form>

    <div class="mt-5 flex items-center justify-between text-sm">
      <a routerLink="/auth/forgot-password" class="text-teal-700 hover:underline">Recuperar contrasena</a>
      <a routerLink="/auth/register" class="text-slate-700 hover:underline">Crear cuenta</a>
    </div>
  </section>
</main>
