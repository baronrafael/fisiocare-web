<main class="auth-shell">
  <section class="fc-card auth-card">
    <header class="auth-header">
      <img src="logo.png" alt="FISIOCARE" class="auth-logo" />
      <p class="auth-subtitle">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>
    </header>

    <form class="mt-6 space-y-4" novalidate (ngSubmit)="onSubmit()">
      <fc-input-field
        label="Correo"
        type="email"
        name="email"
        placeholder="tu-correo@dominio.com"
        [value]="email()"
        [required]="true"
        (valueChange)="email.set($event)"
      />

      <fc-button type="submit" [block]="true" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Enviando...' : 'Enviar enlace' }}
      </fc-button>

      @if (successMessage()) {
        <p class="text-sm text-sky-800">{{ successMessage() }}</p>
      }

      @if (errorMessage()) {
        <p class="text-sm text-red-700">{{ errorMessage() }}</p>
      }
    </form>

    <div class="mt-4">
      <fc-link-button variant="ghost" size="sm" [block]="true" [routerLink]="'/auth/login'">Volver a iniciar sesión</fc-link-button>
    </div>
  </section>
</main>
