<main class="auth-shell">
  <section class="fc-card auth-card">
    <h1 class="auth-title">Recuperar contrasena</h1>
    <p class="auth-subtitle">
      Este flujo estara conectado al backend en la siguiente fase. Por ahora es una vista de referencia.
    </p>

    <div class="mt-6">
      <fc-input-field label="Correo" type="email" placeholder="tu-correo@dominio.com" />
    </div>

    <div class="mt-4">
      <fc-button [block]="true">Enviar enlace</fc-button>
    </div>

    <a routerLink="/auth/login" class="fc-link fc-link-sm mt-4 inline-block">Volver al login</a>
  </section>
</main>
