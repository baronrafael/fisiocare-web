@if (open()) {
  <div class="fixed inset-0 z-50 bg-slate-900/40 px-4 py-6" (click)="onCancel()">
    <section class="mx-auto mt-16 w-full max-w-md rounded-2xl border border-slate-200 bg-white p-4 shadow-xl" (click)="$event.stopPropagation()">
      <h3 class="text-base font-semibold text-slate-900">{{ title() }}</h3>
      <p class="mt-2 text-sm text-slate-600">{{ message() }}</p>

      <div class="mt-4 flex gap-2">
        <button type="button" class="fc-btn fc-btn-ghost w-full" [disabled]="busy()" (click)="onCancel()">
          {{ cancelLabel() }}
        </button>
        <button
          type="button"
          class="fc-btn w-full"
          [class.fc-btn-danger]="destructive()"
          [class.fc-btn-primary]="!destructive()"
          [disabled]="busy()"
          (click)="onConfirm()"
        >
          {{ busy() ? 'Procesando...' : confirmLabel() }}
        </button>
      </div>
    </section>
  </div>
}
