<aside class="hidden border-r border-slate-200 bg-white p-4 md:sticky md:top-[4.5rem] md:block md:h-[calc(100dvh-4.5rem)] md:overflow-y-auto md:flex md:flex-col">
  <nav class="space-y-2 md:flex-1">
    @for (item of navItems(); track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="bg-teal-50 text-teal-800"
        class="block rounded-xl px-3 py-2 text-sm text-slate-700 transition hover:bg-slate-100"
      >
        {{ item.label }}
      </a>
    }
  </nav>

  <button class="fc-btn fc-btn-ghost mt-8 w-full" type="button" (click)="onLogout()">Cerrar sesion</button>
</aside>

<nav class="fixed inset-x-0 bottom-0 z-30 border-t border-slate-200 bg-white px-2 py-2 md:hidden">
  <div class="grid grid-cols-4 gap-1">
    @for (item of navItems(); track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="bg-teal-50 text-teal-800"
        class="rounded-lg px-2 py-2 text-center text-xs font-medium text-slate-600"
      >
        {{ item.label }}
      </a>
    }
  </div>
</nav>
