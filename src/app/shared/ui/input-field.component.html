<label class="block text-sm font-medium text-slate-700">
  {{ label() }}
  <input
    class="fc-input mt-1"
    [attr.type]="type()"
    [attr.name]="name()"
    [attr.placeholder]="placeholder()"
    [value]="value()"
    [required]="required()"
    (input)="onInput($event)"
  />
  @if (error()) {
    <p class="mt-1 text-xs text-red-700">{{ error() }}</p>
  }
</label>
