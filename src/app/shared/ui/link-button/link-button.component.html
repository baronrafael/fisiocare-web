<a
  class="fc-btn inline-flex items-center justify-center whitespace-nowrap"
  [routerLink]="disabled() ? null : routerLink()"
  [attr.href]="disabled() || routerLink() ? null : href()"
  [attr.target]="target()"
  [attr.rel]="rel()"
  [attr.aria-disabled]="disabled() ? 'true' : null"
  [attr.tabindex]="disabled() ? -1 : null"
  [class.pointer-events-none]="disabled()"
  [class.opacity-60]="disabled()"
  [class.fc-btn-primary]="variant() === 'primary'"
  [class.fc-btn-ghost]="variant() === 'ghost'"
  [class.fc-btn-danger]="variant() === 'danger'"
  [class.w-full]="block()"
  [class.text-xs]="size() === 'xs'"
  [class.text-sm]="size() === 'sm'"
>
  <ng-content />
</a>
