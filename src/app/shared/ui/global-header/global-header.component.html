<header class="border-b border-slate-200/80 bg-white/90 px-4 py-3 backdrop-blur">
  <div class="mx-auto flex max-w-6xl items-center justify-between gap-2">
    <p class="text-sm font-semibold tracking-[0.08em] text-slate-800">FISIOCARE</p>

    <div class="flex items-center gap-2">
      <p class="max-w-40 truncate text-sm text-slate-700 sm:max-w-none">{{ fullName() }}</p>
      <span
        class="rounded-full px-3 py-1 text-xs font-semibold"
        [class.bg-slate-100]="plan() === 'free'"
        [class.text-slate-700]="plan() === 'free'"
        [class.bg-teal-50]="plan() === 'premium'"
        [class.text-teal-800]="plan() === 'premium'"
      >
        {{ plan() === 'free' ? 'Free' : 'Premium' }}
      </span>
    </div>
  </div>

  @if (patientLimitReached()) {
    <p class="mx-auto mt-2 max-w-6xl rounded-lg bg-amber-50 px-3 py-2 text-xs text-amber-800">
      Alcanzaste el limite del plan Free (10 pacientes). Actualiza a Premium para continuar.
    </p>
  }
</header>
