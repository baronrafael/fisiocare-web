<header class="border-b border-slate-200/80 bg-white/90 px-4 py-3 backdrop-blur">
  <div class="mx-auto flex max-w-6xl items-center justify-between gap-2">
    <img src="logo.png" alt="FISIOCARE" class="h-8 w-auto" />

    <div class="flex items-center gap-2">
      <p class="max-w-40 truncate text-sm text-slate-700 sm:max-w-none">{{ fullName() }}</p>
      <span
        class="fc-badge-plan"
        [class.fc-badge-plan-free]="plan() === 'free'"
        [class.fc-badge-plan-pro]="plan() === 'pro'"
      >
        {{ plan() === 'free' ? 'Free' : 'Pro' }}
      </span>
      <button
        type="button"
        class="inline-flex h-8 w-8 items-center justify-center rounded-full text-slate-600 transition hover:bg-slate-100 hover:text-slate-900 md:hidden"
        aria-label="Cerrar sesion"
        title="Cerrar sesion"
        (click)="onLogout()"
      >
        <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <path d="M16 17l5-5-5-5" />
          <path d="M21 12H9" />
        </svg>
      </button>
    </div>
  </div>

  @if (patientLimitReached()) {
    <p class="fc-alert-warning-compact mx-auto mt-2 max-w-6xl">
      Alcanzaste el limite del plan Free (10 pacientes). Actualiza a Pro para continuar.
    </p>
  }
</header>
