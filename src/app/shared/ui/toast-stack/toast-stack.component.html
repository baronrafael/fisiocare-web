<section class="pointer-events-none fixed inset-x-0 top-3 z-50 px-3">
  <div class="mx-auto flex w-full max-w-md flex-col gap-2">
    @for (toast of toastService.toasts(); track toast.id) {
      <article
        class="fc-toast"
        [class.fc-toast-success]="toast.type === 'success'"
        [class.fc-toast-info]="toast.type === 'info'"
        [class.fc-toast-warning]="toast.type === 'warning'"
        [class.fc-toast-error]="toast.type === 'error'"
        [class.fc-toast-exit]="toast.exiting"
        [attr.aria-live]="liveMode(toast.type)"
        [attr.role]="role(toast.type)"
        (mouseenter)="onMouseEnter(toast)"
        (mouseleave)="onMouseLeave(toast)"
      >
        <div class="fc-toast-body">
          <span class="fc-toast-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path [attr.d]="iconPath(toast.type)" />
            </svg>
          </span>

          <div class="fc-toast-copy">
            <p class="fc-toast-title">{{ toast.title }}</p>
            <p class="fc-toast-message">{{ toast.message }}</p>
          </div>

          @if (toast.dismissible) {
            <button class="fc-toast-close" type="button" (click)="toastService.dismiss(toast.id)">
              Cerrar
            </button>
          }
        </div>
      </article>
    }
  </div>
</section>
