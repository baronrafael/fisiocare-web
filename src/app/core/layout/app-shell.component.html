<div class="min-h-dvh">
  <fc-global-header
    [fullName]="userFullName()"
    [plan]="activePlan()"
    [patientLimitReached]="patientLimitReached()"
    (logoutRequested)="logout()"
  />

  <div class="shell-layout" [class.shell-layout-collapsed]="isNavCollapsed()">
    <fc-app-navigation
      [navItems]="navItems"
      [collapsed]="isNavCollapsed()"
      (toggleCollapsed)="toggleNavCollapsed()"
      (logout)="logout()"
    />

    <section class="pb-24 md:pb-0">
      <main class="mx-auto max-w-6xl px-4 py-4 md:py-6">
        <router-outlet />
      </main>
    </section>
  </div>

  <fc-toast-stack />
</div>
